name: 🐛 Bug Report
description: Report unexpected API behavior
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## Please fill in all required fields to help us reproduce the issue.

  - type: dropdown
    id: endpoint
    attributes:
      label: "Endpoint"
      description: |
        The endpoint called at the time of the issue (if applicable).
      options:
        - "POST /receipt"
        - "GET /receipts/{id}"
        - "GET /invoices_download/{id}"
        - "POST /receipts/{id}/approve"
        - "POST /receipts/{id}/reject"
        - "POST /company"
        - "GET /company/{id}"
        - "DELETE /company/{id}"
        - "POST /employee"
        - "DELETE /employee/{id}"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: |
        Describe the actual behavior and the expected behavior.
      placeholder: |
        Actual behavior: ...
        Expected behavior: ...
    validations:
      required: true

  - type: textarea
    id: payload
    attributes:
      label: "Payload (anonymized)"
      description: |
        Include the request payload, removing any sensitive data (e.g. base64 images, personal data).
      render: json
    validations:
      required: false
