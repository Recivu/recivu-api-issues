name: Dispatch Bug to Automation

on:
  issues:
    types: [labeled]

jobs:
  dispatch:
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Post acknowledgment comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 Bug ricevuto. Un agente automatico analizzerà il problema e aprirà una pull request con una proposta di fix.'
            });

      - name: Trigger automation
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.AUTOMATION_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'Recivu',
              repo: 'recivu-automation',
              event_type: 'bug_reported',
              client_payload: {
                issue_number: context.issue.number,
                issue_title: context.payload.issue.title,
                issue_body: context.payload.issue.body,
                issue_url: context.payload.issue.html_url,
                issues_repo: context.repo.repo
              }
            });
